version: 1

defaults:
  artifactsRoot: .benchmarks/runs
  reportsRoot: .benchmarks/reports
  timeoutSeconds: 900
  warmupPrompt: "Say Hello World!"
  skipPermissions: abort

tools:
  - id: codex
    enabled: true
  - id: opencode
    enabled: true
  - id: claude
    enabled: true

models:
  - id: qwen3-coder-next:q4_K_M
    provider: ollama
    enabled: true
  - id: qwen3-coder-next:q8_0
    provider: ollama
    enabled: true
  - id: glm-4.7-flash:q4_K_M
    provider: ollama
    enabled: true
  - id: gpt-oss:20b
    provider: ollama
    enabled: true
  - id: gpt-oss:120b
    provider: ollama
    enabled: true

tasks:
  - id: run-tests
    repoPath: ~/dev/fst-common
    prompt: "Führe die Tests aus."
  - id: run-build-checks
    repoPath: ~/dev/fst-common
    prompt: "Führe die Build-Checks aus."
